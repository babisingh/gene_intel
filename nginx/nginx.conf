# ── Gene-Intel — Nginx reverse proxy ─────────────────────────────────────────
#
# Handles:
#   - HTTP → HTTPS redirect
#   - TLS termination (Let's Encrypt certs via Certbot)
#   - Rate limiting on /api/* (60 req/min per IP, burst 20)
#   - Proxy to FastAPI container (api:8000)
#   - Large response timeouts for graph queries and LLM agent calls
#
# Replace "yourdomain.com" with your actual domain before deploying.

# Rate limiting: 60 requests/minute per IP address
limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=60r/m;

# Upstream FastAPI service (Docker internal DNS)
upstream gene_intel_api {
    server api:8000;
    keepalive 32;
}

# ── HTTP: redirect all traffic to HTTPS ──────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Let Certbot serve the ACME challenge over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main production server ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # TLS certificates (issued by certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Modern TLS-only configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # Increase body size limit for any potential batch requests
    client_max_body_size 1M;

    # ── /api/* — FastAPI endpoints ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api_ratelimit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://gene_intel_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # LLM agent calls can take up to 60s
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # ── /assets/* — static frontend files (JS/CSS bundles, high cache TTL) ──
    location /assets/ {
        proxy_pass       http://gene_intel_api;
        proxy_set_header Host $host;
        # Vite builds content-hashed filenames — safe to cache aggressively
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── / — React SPA (no caching on index.html) ────────────────────────────
    location / {
        proxy_pass         http://gene_intel_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Never cache index.html so React Router and SW updates work correctly
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
