version: "3.9"

services:
  api:
    build:
      context: packages/tinsel-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TINSEL_ENV=${TINSEL_ENV:-development}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: apps/dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - TINSEL_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
